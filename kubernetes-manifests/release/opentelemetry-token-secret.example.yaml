# EXAMPLE ONLY — DO NOT COMMIT A REAL TOKEN.
#
# The OpenTelemetry Operator reads the Dynatrace OTLP ingest token from this
# Secret and injects it as the OTEL_EXPORTER_OTLP_HEADERS env var into every
# instrumented easyTrade pod (referenced by opentelemetry-instrumentation.yaml).
#
# The whole header string lives in the Secret value, so the token never appears
# in the Instrumentation CR or any other manifest.
#
# PREFERRED: create the Secret imperatively so it is never written to disk in the
# repo. Replace <ingest-token> with the value from
#   Bluebox -> Onboarding -> Instrumentation setup -> Reveal token
# and run (in the same namespace as the easyTrade workloads):
#
#   kubectl create secret generic dynatrace-otel-ingest \
#     --from-literal=OTEL_EXPORTER_OTLP_HEADERS="Authorization=Api-Token <ingest-token>" \
#     -n <easytrade-namespace>
#
# Only use the manifest below if you manage Secrets through sealed-secrets / SOPS
# / an external secret store. If you must keep a plaintext copy locally, name it
# WITHOUT the `.example` suffix and ensure that filename is git-ignored first.
apiVersion: v1
kind: Secret
metadata:
  name: dynatrace-otel-ingest
type: Opaque
stringData:
  OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Api-Token <ingest-token>"
