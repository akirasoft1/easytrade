# gke-autopilot-values.yaml
# Resource overrides for GKE Autopilot compatibility and LoadBalancer settings.
#
# Also carries the OpenTelemetry instrumentation opt-in and the Dynatrace OneAgent
# opt-out, applied as per-service podAnnotations (rendered by the `app` subchart's
# _pod.tpl). This persists the zero-code OTel injection and the pure-OTel choice
# across `helm upgrade`. See kubernetes-manifests/release/OPENTELEMETRY.md.
#
# The 11 services below carry:
#   instrumentation.opentelemetry.io/inject-<lang>: "easytrade"  # OTel Operator injection
#   dynatrace.com/inject: "false"                                # disable OneAgent (pure OTel)
# Services WITHOUT these annotations (Go aggregator/pricing/problem-operator, frontend,
# calculationservice, db, rabbitmq) intentionally keep OneAgent.

accountservice:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 100m
      memory: 600Mi
    limits:
      memory: 600Mi
      # CPU limits are omitted throughout for Autopilot compatibility

aggregator-service:
  resources:
    requests:
      cpu: 50m
      memory: 52Mi
    limits:
      memory: 52Mi

broker-service:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-dotnet: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 150m
      memory: 350Mi
    limits:
      memory: 350Mi

calculationservice:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 128Mi

contentcreator:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 75m
      memory: 400Mi
    limits:
      memory: 400Mi

credit-card-order-service:
  # Using default image repository by intentionally omitting image override overrides.
  # This reverts from the GCP artifact registry to the default `europe-docker.pkg.dev/...`
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 100m
      memory: 650Mi
    limits:
      memory: 650Mi

db:
  resources:
    requests:
      cpu: 250m
      memory: 1.5Gi
    limits:
      memory: 1.5Gi

engine:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-java: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 75m
      memory: 450Mi
    limits:
      memory: 450Mi

feature-flag-service:
