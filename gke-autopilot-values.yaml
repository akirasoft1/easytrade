    instrumentation.opentelemetry.io/inject-java: "easytrade"
    dynatrace.com/inject: "false"
  service:
    type: LoadBalancer # From your custom manifest overrides
  resources:
    requests:
      cpu: 100m
      memory: 600Mi
    limits:
      memory: 600Mi

frontend:
