    instrumentation.opentelemetry.io/inject-dotnet: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 75m
      memory: 450Mi
    limits:
      memory: 450Mi

manager:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-dotnet: "easytrade"
    dynatrace.com/inject: "false"
  resources:
    requests:
      cpu: 100m
      memory: 600Mi
    limits:
      memory: 600Mi

offerservice:
  podAnnotations:
    instrumentation.opentelemetry.io/inject-nodejs: "easytrade"
    dynatrace.com/inject: "false"

pricing-service:
